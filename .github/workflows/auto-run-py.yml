name: Auto Run Python Script and Upload Files

on:
  schedule:
    # 每隔半小时触发一次（UTC时间）
    - cron: '0,30 * * * *'
  # 保留手动触发，方便测试
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          echo "PWD:"
          pwd
          echo "Root files:"
          ls -la
          echo "Update dir files (if exists):"
          ls -la update || true

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f update/requirements.txt ]; then
            pip install -r update/requirements.txt
          else
            echo "ERROR: requirements.txt not found in repo root or update/ subdir"
            exit 1
          fi

      - name: Run Python script
        run: python main.py

      - name: Collect generated db files
        run: |
          mkdir -p ./generated_files/db
          find ./generated_files -type f -name "*.db" -exec cp -f {} ./generated_files/db/ \;
          echo "Collected DB files:"
          ls -la ./generated_files/db || true

      - name: Commit and push files
        run: |
          git config --global user.name "Yogurt114514"
          git config --global user.email "1157733847@qq.com"
          # 提交生成文件（包含集中收集的 db）
          git add ./generated_files/*
           # 显式提交版本文件，确保这两个文本一定被纳入提交
           git add ./generated_files/plugins/新数据/version1.txt ./generated_files/plugins/新数据/version2.txt
           if git diff --cached --quiet; then
            echo "No files changed, skip commit"
          else
            git commit -m "Auto update: Generate files at $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
