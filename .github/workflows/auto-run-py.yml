name: Auto Run Python Script and Upload Files

on:
  schedule:
    # 每隔半小时触发一次（UTC时间）
    - cron: '0,30 * * * *'
  # 保留手动触发，方便测试
  workflow_dispatch:

jobs:
  run-script-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -V
          which python
          if [ ! -f requirements.txt ]; then
            echo "ERROR: requirements.txt not found in repository root"
            ls -la
            exit 1
          fi
          python -m pip install -r requirements.txt
          python -m pip show httpx
          python -c "import httpx; print('httpx ok:', httpx.__version__)"

      - name: Run Python script
        run: python main.py

      - name: Commit and push files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 替换为你实际的生成文件路径
          git add ./generated_files/*
          if git diff --quiet; then
            echo "No files changed, skip commit"
          else
            git commit -m "Auto update: Generate files at $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
